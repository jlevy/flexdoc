# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    # Use ["main", "master"] for CI only on the default branch.
    # Use ["**"] for CI on all branches.
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        # Update this as needed:
        # Common platforms: ["ubuntu-latest", "macos-latest", "windows-latest"]
        os: ["ubuntu-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    # Linux only by default. Use ${{ matrix.os }} for other OSes.
    runs-on: ${{ matrix.os }}

    steps:

      # Generally following uv docs:
      # https://docs.astral.sh/uv/guides/integration/github/

      - name: Checkout (official GitHub action)
        uses: actions/checkout@v6
        with:
          # Important for versioning plugins:
          fetch-depth: 0

      # cydifflib builds from source on some platforms and needs CMake present.
      - name: Display CMake Version
        run: cmake --version

      - name: Install uv (official Astral action)
        # Pinned to a full, immutable version tag. As of v8, setup-uv no longer
        # publishes floating major/minor tags (e.g. `@v8`), so bump this exact
        # version when updating.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          # Update this as needed:
          version: "0.11.12"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python (using uv)
        run: uv python install

      # Alternately can use the official Python action:
      # - name: Set up Python (using actions/setup-python)
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: ${{ matrix.python-version }}

      # Supply-chain hardening: install exactly what the committed lockfile pins
      # (fails if pyproject.toml and uv.lock have drifted). The cool-off cutoff lives
      # in [tool.uv] exclude-newer in pyproject.toml, so it applies at lock, sync, and
      # run time without a separate CI step. See SUPPLY-CHAIN-SECURITY.md.
      - name: Install all dependencies
        run: uv sync --all-extras --locked

      - name: Run linting
        # Check-only mode so CI fails on unformatted code instead of fixing it.
        run: uv run python devtools/lint.py --check

      - name: Run tests
        run: uv run pytest

  # Supply-chain audit gate. See SUPPLY-CHAIN-SECURITY.md.
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (official GitHub action)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.12"
          enable-cache: true

      # --ignore-vuln PYSEC-2026-196: a CVE in `pip` itself, which is only present as a
      # transitive dependency of the pip-audit tool (audit group), not a flexdoc
      # runtime/dev dependency, and is never shipped in the flexdoc wheel. Its fix
      # (pip 26.1.2) is newer than the [tool.uv] exclude-newer cool-off cutoff, so there
      # is no within-policy bump; this ignore does not touch dependency resolution or the
      # cool-off. Remove it once the cutoff advances past pip 26.1.2's release. See
      # SUPPLY-CHAIN-SECURITY.md (Audit-Gate Ignores).
      - name: Audit dependencies for known vulnerabilities
        run: uv run --locked --group audit pip-audit --ignore-vuln PYSEC-2026-196

  # Packaging check: the flexdoc wheel must import cleanly from an isolated install, not
  # just from the source tree. Guards against missing package data or accidental reliance
  # on the working directory.
  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (official GitHub action)
        uses: actions/checkout@v6
        with:
          # Needed for the dynamic-versioning build backend (reads git tags).
          fetch-depth: 0

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.12"
          enable-cache: true

      - name: Build the wheel
        run: uv build --wheel

      - name: Install the wheel in an isolated venv and import the package
        run: |
          uv venv /tmp/wheelsmoke
          VENV_PY=/tmp/wheelsmoke/bin/python
          uv pip install --python "$VENV_PY" dist/*.whl
          "$VENV_PY" -c "import flexdoc; from flexdoc.docs import TextDoc; from flexdoc.html import html_to_plaintext; print('wheel imports OK:', flexdoc.__name__, TextDoc.__name__)"
